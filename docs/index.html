<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>돌팔이 봇 설명서</title>
    <style>
        :root {
            --discord-blue: #5865F2;
            --discord-dark: #313338;
            --discord-black: #1E1F22;
            --text-white: #FFFFFF;
            --text-gray: #B5BAC1;
            --patch-gray: #4E5058;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--discord-dark);
            color: var(--text-white);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- 메인 히어로 섹션 --- */
        #main-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .highlight {
            color: var(--discord-blue);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
        }

        .btn-invite {
            background-color: var(--discord-blue);
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-copy {
            background-color: var(--patch-gray);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* 4개 메인 버튼 그리드 */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .menu-item {
            background-color: var(--discord-black);
            padding: 20px 35px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            border: 2px solid transparent;
            transition: 0.3s;
            font-weight: 600;
        }

        .menu-item:hover {
            border-color: var(--discord-blue);
            transform: translateY(-3px);
        }

        /* 패치 노트 버튼 (작은 사이즈) */
        .btn-patch {
            background-color: transparent;
            color: var(--text-gray);
            border: 1px solid var(--patch-gray);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-patch:hover {
            background-color: var(--patch-gray);
            color: white;
        }

        /* --- 위키 레이아웃 --- */
        #wiki-page {
            position: fixed;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--discord-dark);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            z-index: 10;
        }

        nav {
            position: sticky;
            top: 0;
            background-color: var(--discord-black);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--discord-blue);
            cursor: pointer;
        }

        .btn-back {
            background: none;
            border: 1px solid var(--text-gray);
            color: var(--text-gray);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .wiki-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .toc {
            background: var(--discord-black);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 40px;
        }

        .toc a {
            display: block;
            color: var(--discord-blue);
            text-decoration: none;
            margin: 8px 0;
        }

        #wiki-content p {
            line-height: 1.8;
            color: var(--text-gray);
            white-space: pre-wrap;
            /* \n 줄바꿈 적용 */
            margin-bottom: 20px;
        }

        section {
            margin-top: 50px;
            border-top: 1px solid var(--patch-gray);
            padding-top: 20px;
        }

        h2 {
            color: var(--discord-blue);
        }

        .show-wiki #main-hero {
            transform: translateY(-100%);
        }

        .show-wiki #wiki-page {
            transform: translateY(-100%);
        }
    </style>
</head>

<body class="">

    <main id="main-hero">
        <h1><span class="highlight">돌팔이</span> 봇으로 서버에 활기를!</h1>

        <div class="btn-group">
            <a href="https://discord.com/oauth2/authorize?client_id=1444900993077739570&permissions=8&integration_type=0&scope=bot"
                class="btn-invite">봇 초대하기</a>
            <button class="btn-copy" onclick="copyInvite()">초대 링크 복사</button>
        </div>

        <div class="grid-menu">
            <div class="menu-item" onclick="openWiki('intro')">📄 소개 및 이용약관</div>
            <div class="menu-item" onclick="openWiki('basic')">🛠️ 기본 기능들</div>
            <div class="menu-item" onclick="openWiki('games')">🎮 돌멩이 게임들</div>
            <div class="menu-item" onclick="openWiki('usage')">💎 돌멩이 사용처</div>
        </div>

        <button class="btn-patch" onclick="openWiki('patch')">📋 패치 내역 / 알려진 문제</button>
    </main>

    <div id="wiki-page">
        <nav>
            <div class="nav-logo" onclick="closeWiki()">돌팔이</div>
            <button class="btn-back" onclick="closeWiki()">뒤로가기</button>
        </nav>
        <div class="wiki-container">
            <h1 id="wiki-title">문서 제목</h1>
            <div class="toc">
                <h3>목차</h3>
                <div id="toc-list"></div>
            </div>
            <div id="wiki-content"></div>
        </div>
    </div>

    <script>
        const wikiData = {
            'intro': {
                title: '소개 및 이용약관',
                sections: [
                    { id: 'about', title: '봇 소개', content: '길에서 주워온 돌팔이 봇입니다.\n친구들과 가지고 놀기엔 딱이에요.\n조금 싸가지도 없고 말투도 킹받지만 심심할때 가지고 놀아보세요.' },
                    { id: 'rules', title: '이용약관', content: '돌팔이 봇 이용 규칙\n1. 돌팔이 봇은 재미를 최우선으로 생각하며 사용자들에게 재미를 줄 목적으로 만들어졌습니다.\n2. 돌팔이 봇의 모든 기능은 현금과 전혀 관련이 없으며 단순 재미를 위한 기능입니다.\n3. 돌팔이 봇의 사용으로 인해 발생한 피해나 손해에 대해 개발자는 책임지지 않습니다. 다만 피해나 악용이 우려되는 부분에 대해 언제든 제보 가능합니다.\n4. 돌팔이 봇의 서비스를 위해 최선을 다하지만, 예기치 못한 문제로 인해 발생하는 봇의 데이터 손실에 대해 개발자는 책임지지 않습니다.\n5. 돌팔이 봇을 악용하거나 기타 커뮤니티에 피해가 가는 행동이 제보되거나 감지될 경우, 유저는 봇 사용이 제한될수 있습니다.' },
                    { id: 'datas', title: '개인정보 수집', content: '개인정보 수집\n1. 돌팔이 봇은 원활한 운영을 위해 다음과 같은 개인정보를 저장합니다.\n- 서버 고유 ID, 채널 고유 ID (공지 서비스를 위한 데이터)\n- 유저의 고유 ID (유저의 돌멩이 관련 데이터 저장)\n- 유저의 돌팔이 봇 명령어 사용 기록 (명령어 사용 횟수, 사용 시간 등)\n2. 돌팔이 AI는 다음과 같은 개인정보를 수집하며 55일 뒤에 자동으로 파기됩니다.\n- 유저의 서버 내 닉네임\n- 유저의 AI 채팅 내역 (질문과 답변)\n3. 그 외 모든 데이터는 별도로 수집하거나 저장하지 않습니다.\n4. 모든 개인정보 관련 데이터는 서비스 제공을 위해 이용 기간 동안만 보관되며, 서비스 종료시 파기됩니다.\n5. 수집된 모든 데이터는 AI 학습에 사용되지 않습니다.\n6. 모든 유저는 본인이 원할때 개발자에게 연락해 개인정보 관련 데이터를 삭제할 수 있습니다.' },
                    { id: 'etc', title: '기타 문의 및 제보', content: '돌팔이 봇의 불쾌한 부분이나 개선이 필요한 사항, 개인정보 삭제 관련 사항은 언제든지 /제보 명령어를 이용해 개발자에게 제보가 가능합니다.' }
                ]
            },
            'basic': {
                title: '기본 기능들',
                sections: [
                    { id: 'gpt', title: 'AI 응답', content: '돌팔이에게 말을 걸면 딱히 별 도움은 안되는 나사빠진 답변을 해줍니다.\n호출 트리거는 "돌팔이님~", "돌팔아~", "돌팔이야~", "돌팔이새끼~", "돌팔이쉨~", "돌팔이샊~" 입니다.\nAI 응답 사용시 해당 질문과 답변이 서버에 약 2개월간 저장됩니다.\n민감한 정보가 포함되지 않게 주의하세요.' },
                    { id: 'help', title: '/사용법', content: '현재 이 웹페이지를 보여줍니다.' },
                    { id: 'accept', title: '/약관', content: '돌팔이 봇의 이용 약관을 보여줍니다.\n모든 유저는 약관에 동의해야 봇을 사용할 수 있습니다.' },
                    { id: 'report', title: '/제보', content: '개발자에게 봇의 버그나 개선사항, 추가되면 좋겠다 싶은 아이디어를 전송합니다.\n스팸 및 도배시 해당 기능이 차단될수도 있습니다.\n중요한 버그를 제보하여 봇의 발전에 도움을 주신다면 약간의 돌멩이를 드립니다!' },
                    { id: 'userset', title: '/사용설정', content: '/사용설정 [옵션]\n어느 채널에서 봇을 사용하고 금지할지 설정합니다.\n서버 관리자와 기타 권한이 있는 유저는 이 제한을 무시합니다.\n\n[설정 옵션]\n - 없음 : 현재 서버의 모든 채널에서 봇 사용을 허용합니다.\n - 현재 채널 금지 : 현재 채널에서 봇 사용을 금지합니다.\n - 현재 채널 허용 : 현재 채널에서 봇 사용을 허용합니다.\n - 현재 채널만 허용 : 현재 채널을 제외한 서버의 모든 채널에서 봇 사용을 금지합니다.' },
                    { id: 'notiset', title: '/ai설정', content: '/ai설정 [옵션]\n어느 채널에서 ai응답을 사용하고 금지할지 설정합니다.\n서버 관리자와 기타 권한이 있는 유저는 이 제한을 무시합니다.\n\n[설정 옵션]\n - 없음 : 현재 서버의 모든 채널에서 ai 응답을 허용합니다.\n - 현재 채널 금지 : 현재 채널에서 ai 응답을 금지합니다.\n - 현재 채널 허용 : 현재 채널에서 ai 응답을 허용합니다.\n - 현재 채널만 허용 : 현재 채널을 제외한 서버의 모든 채널에서 ai 응답을 금지합니다.' },
                    { id: 'notiset', title: '/ai성격', content: '/ai성격 [프롬프트]\n돌팔이 ai의 성격과 말투를 설정합니다.\n230글자까지 입력 가능하며 기본값이라고 입력시 원래 말투와 성격으로 되돌아갑니다.\n어떻게 할지 고민된다면 기본값을 입력해 기존 세팅을 확인하세요.' },
                    { id: 'notiset', title: '/공지설정', content: '이 명령어를 입력한 채널로 해당 게임의 점검 공지를 설정합니다.\n\n[현재 알림 서비스 중인 게임]\n - 마비노기 모바일(점검 시작 및 알림)\n\n서비스 게임은 더 추가 예정이며 추가되면 좋겠다 싶은 게임은 언제든 제보 주세요!' },
                    { id: 'notirem', title: '/공지해제', content: '해당 채널에 등록된 모든 공지를 해제합니다.' },
                    { id: 'hangang', title: '/한강', content: '현재 한강의 수온과 성분을 자세히 알려줍니다.\n서울시의 수질 측정 시스템을 이용합니다.' },
                    { id: 'luck', title: '/운세', content: '돌팔이가 측정한 오늘의 운세를 보여줍니다.\n확률과 연관은 없습니다.' },
                    { id: 'trends', title: '/실검', content: '나무위키 기준 현재 인기 검색어를 보여줍니다.' },
                    { id: 'news', title: '/뉴스', content: '`/뉴스 [검색어]`\n[검색어]에 대한 최신 인터넷 기사들을 보여줍니다.\n메이저 언론사만 취급합니다.' },
                    { id: 'zipchat', title: '/요약', content: '`/요약 [채팅 수]`\n[채팅 수]만큼의 최신 채팅 내용을 3줄로 요약합니다.\n4 이상 50 이하의 수만 입력 가능합니다.' }
                ]
            },
            'games': {
                title: '돌멩이 게임들',
                sections: [
                    { id: 'definfo', title: '기본 정보', content: '!!모든 기능은 현금과 전혀 관계가 없으며 재미로만 이용해주세요!!\n대부분의 게임은 모두 유저에게 유리하도록 세팅되어있습니다.\n진지하게 하지 마시고 가볍게 즐겨주세요.\n\n돌멩이의 수량 및 정보는 유저 고유 id와 연동되며 다른 서버에서도 유지됩니다.\n돌멩이 입력시 숫자와 한글 혼합 사용을 지원합니다.\n예시) /베팅 1만2천 -> 12000 돌멩이 베팅\n\n[ 인식 가능한 돌멩이 단위 ]\n1만: 10000\n1억: 100000000\n1조: 1000000000000\n1경: 10000000000000000\n1해: 1000000000000000000000\n1자: 1000000000000000000000000\n1양: 10000000000000000000000000000\n1구: 100000000000000000000000000000000\n1간: 1000000000000000000000000000000000000\n최대 돌멩이: 9999999999999999999999999999999999999999 (9999간 9999구)\n최대 돌멩이 이상의 돌멩이는 무시됩니다.\n' },

                    { id: 'helpme', title: '/구제', content: '모든 돌멩이를 탕진한 사람을 위한 기능입니다.\n서버에 있는 친구들에게 구제 요청을 합니다.\n친구들이 도와주기를 눌렀을 경우 돌멩이 20개 획득, 어쩔티비를 눌렀을 경우 돌멩이를 20개 잃습니다.\n친구들은 어떤 버튼을 눌러도 아무런 이득과 손해를 보지 않습니다.\n현재 보유 돌멩이가 0개일 경우에만 사용 가능하며 6시간에 한번 사용 가능합니다.' },

                    { id: 'roulette', title: '/슬롯', content: '`/슬롯 [돌멩이]`\n[돌멩이] 만큼 투자하여 슬롯머신을 돌립니다.\n10 이상 1000이하의 돌멩이를 넣어야 합니다.\n기댓값은 1.26(+26%) 입니다' },

        function openWiki(category) {
            const data = wikiData[category];
            document.getElementById('wiki-title').innerText = data.title;
            let tocHtml = ''; let contentHtml = '';
            data.sections.forEach(sec => {
                tocHtml += `<a href="#${sec.id}">• ${sec.title}</a>`;
                contentHtml += `<section id="${sec.id}"><h2>${sec.title}</h2><p>${sec.content}</p></section>`;
            });
            document.getElementById('toc-list').innerHTML = tocHtml;
            document.getElementById('wiki-content').innerHTML = contentHtml;
            document.body.classList.add('show-wiki');
            document.getElementById('wiki-page').scrollTop = 0;
        }

        function closeWiki() { document.body.classList.remove('show-wiki'); }

        function copyInvite() {
            const dummy = document.createElement("input");
            const text = "https://discord.com/oauth2/authorize?client_id=1444900993077739570&permissions=8&integration_type=0&scope=bot";
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            alert("초대 링크가 복사되었습니다!");
        }
